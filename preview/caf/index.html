<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAF | Digital Ads Preview Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');

        :root {
            --bg-body: #0a0a0a;
            --bg-card: #171717;
            --border-color: #262626;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --accent-color: #e11d48;
        }

        .light-mode {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --border-color: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-color: #be123c;
        }

        body {
            background-color: var(--bg-body);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .banner-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            height: fit-content;
            transition: all 0.3s ease;
        }

        .banner-card:hover {
            border-color: var(--accent-color);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .iframe-container {
            background: #ffffff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            /*  border-radius: 4px;
            border: 1px solid #ddd; */
        }

        iframe {
            border: none;
            display: block;
        }

        .section-divider {
            border-top: 1px solid var(--border-color);
            margin: 4rem 0 2rem 0;
            padding-top: 2rem;
        }

        .status-pill {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .sticky-nav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg-body);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 0;
            margin-bottom: 2rem;
        }
    </style>
</head>

<body class="p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto">
        <header class="mb-12 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h1 class="text-4xl font-black tracking-tight" style="color: var(--text-main);">
                    CAF <span class="text-rose-600">— Digital Ads Inventory</span>
                </h1>
                <p style="color: var(--text-muted);" class="mt-2 text-lg">Previewing 20 assets across 4 campaign
                    sections.</p>
            </div>

            <div class="flex gap-3">
                <button onclick="toggleTheme()"
                    class="px-5 py-2.5 bg-neutral-800 text-white rounded-xl text-xs font-bold hover:bg-neutral-700 transition-all border border-neutral-700"
                    id="themeBtn">
                    <span id="themeText">LIGHT MODE</span>
                </button>
                <button onclick="refreshAllAds()"
                    class="px-5 py-2.5 bg-rose-600 hover:bg-rose-500 text-white rounded-xl text-xs font-bold transition-all shadow-lg shadow-rose-500/20">
                    REPLAY ALL
                </button>
            </div>
        </header>

        <nav class="flex flex-wrap gap-4 mb-12 sticky top-4 z-40 bg-opacity-90 backdrop-blur-md py-4">
            <a href="#aztrazeneca"
                class="px-4 py-2 bg-neutral-200 dark:bg-neutral-800 rounded-lg text-xs font-bold hover:text-rose-500 transition-colors">ASTRAZENECA</a>
            <a href="#barbara"
                class="px-4 py-2 bg-neutral-200 dark:bg-neutral-800 rounded-lg text-xs font-bold hover:text-rose-500 transition-colors">BARBARA</a>
            <a href="#landsec"
                class="px-4 py-2 bg-neutral-200 dark:bg-neutral-800 rounded-lg text-xs font-bold hover:text-rose-500 transition-colors">LANDSEC</a>
            <a href="#rosie-marie"
                class="px-4 py-2 bg-neutral-200 dark:bg-neutral-800 rounded-lg text-xs font-bold hover:text-rose-500 transition-colors">ROSIE+MARIE</a>
        </nav>

        <!-- Main Content Area -->
        <div id="sections-container">
            <!-- Sections will be injected here via JavaScript -->
        </div>

        <footer class="mt-24 py-12 border-t border-neutral-800 text-center opacity-60">
            <p class="text-sm">&copy; <span id="currentYear"></span> CAF Digital Preview System. Built for
                high-performance campaign QA.</p>
        </footer>
    </div>

    <script>
        // Configuration for the 20 sizes distributed across 4 sections
        const inventory = [
            {
                id: "aztrazeneca",
                title: "AstraZeneca",
                folder: "AstraZeneca",
                sizes: ["300x250", "300x600", "320x50", "460x1500Left", "460x1500Right", "728x90", "970x250"]
            },
            {
                id: "barbara",
                title: "Barbara",
                folder: "Barbara",
                sizes: ["300x250", "300x600", "320x480", "320x50", "460x1500Left", "460x1500Right", "728x90", "970x250"]
            },
            {
                id: "landsec",
                title: "Landsec",
                folder: "Landsec",
                sizes: ["120x600", "300x50", "320x480"]
            },
            {
                id: "rosie-marie",
                title: "Rosie + Marie",
                folder: "Rosie_Marie",
                sizes: ["120x600", "300x50"]
            }
        ];

        function renderInventory() {
            const container = document.getElementById('sections-container');
            let html = '';

            inventory.forEach(section => {
                html += `
                    <section id="${section.id}" class="section-divider">
                        <div class="flex items-center gap-4 mb-8">
                            <h2 class="text-2xl font-bold tracking-tight">${section.title}</h2>
                            <span class="status-pill bg-neutral-500/10 text-neutral-500 border border-neutral-500/20">${section.sizes.length} Sizes</span>
                        </div>
                        <div class="flex flex-wrap gap-8 justify-start items-start">
                            ${section.sizes.map(size => {
                    const [w, hRaw] = size.split('x');
                    const h = parseInt(hRaw);
                    return `
                                    <div class="banner-card">
                                        <div class="w-full flex justify-between items-center opacity-70 mb-1 px-1">
                                            <span class="font-bold text-[10px] tracking-widest">${size}</span>
                                            <span class="text-[8px] font-black uppercase text-rose-500">Campaign: ${section.folder}</span>
                                        </div>
                                        <div class="iframe-container" style="width: ${w}px; height: ${h}px;">
                                            <iframe src="CAF_BGSH_${section.folder}_${size}_HTML5_Lark_V1/index.html" width="${w}" height="${h}" scrolling="no" loading="lazy"></iframe>
                                        </div>
                                    </div>
                                `;
                }).join('')}
                        </div>
                    </section>
                `;
            });

            container.innerHTML = html;
        }

        document.getElementById('currentYear').innerText = new Date().getFullYear();

        function refreshAllAds() {
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(iframe => {
                const currentSrc = iframe.src;
                iframe.src = '';
                setTimeout(() => { iframe.src = currentSrc; }, 50);
            });
        }

        function toggleTheme() {
            const body = document.body;
            const text = document.getElementById('themeText');
            body.classList.toggle('light-mode');
            text.innerText = body.classList.contains('light-mode') ? 'DARK MODE' : 'LIGHT MODE';
        }

        // Initialize on load
        window.onload = renderInventory;
    </script>
</body>

</html>
