<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Briden Mechanical Services - Banner Presentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            color: #1e293b;
        }
        .banner-container {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            transition: all 0.2s;
        }
        .banner-container:hover {
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        img {
            display: block;
            max-width: 100%;
            height: auto;
        }
        /* Grid helper for different sizes */
        .preview-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            align-items: flex-start;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 py-8 mb-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center space-x-4">
                <div class="bg-blue-600 p-3 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Briden Mechanical Services</h1>
                    <p class="text-slate-500 font-medium">Digital Asset Presentation - Scene Preview</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-24">
        
        <!-- 300x250 Section -->
        <section class="mb-16">
            <div class="flex items-baseline space-x-3 mb-6 border-b border-slate-200 pb-2">
                <h2 class="text-xl font-bold text-slate-800">Medium Rectangle</h2>
                <span class="text-slate-400 font-mono text-sm">300 x 250</span>
            </div>
            <div class="preview-grid">
                <div class="space-y-2">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Scene 1</span>
                    <div class="banner-container" style="width: 300px; height: 250px;">
                        <img src="300x250.png" alt="300x250 Scene 1">
                    </div>
                </div>
                <div class="space-y-2">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Scene 2</span>
                    <div class="banner-container" style="width: 300px; height: 250px;">
                        <img src="300x250-2.png" alt="300x250 Scene 2">
                    </div>
                </div>
            </div>
        </section>

        <!-- 728x90 Section -->
        <section class="mb-16">
            <div class="flex items-baseline space-x-3 mb-6 border-b border-slate-200 pb-2">
                <h2 class="text-xl font-bold text-slate-800">Leaderboard</h2>
                <span class="text-slate-400 font-mono text-sm">728 x 90</span>
            </div>
            <div class="space-y-8">
                <div class="space-y-2">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Scene 1</span>
                    <div class="banner-container" style="width: 728px; height: 90px;">
                        <img src="728x90.png" alt="728x90 Scene 1">
                    </div>
                </div>
                <div class="space-y-2">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Scene 2</span>
                    <div class="banner-container" style="width: 728px; height: 90px;">
                        <img src="728x90-2.png" alt="728x90 Scene 2">
                    </div>
                </div>
            </div>
        </section>

        <!-- 160x600 Section -->
        <section class="mb-16">
            <div class="flex items-baseline space-x-3 mb-6 border-b border-slate-200 pb-2">
                <h2 class="text-xl font-bold text-slate-800">Wide Skyscraper</h2>
                <span class="text-slate-400 font-mono text-sm">160 x 600</span>
            </div>
            <div class="preview-grid">
                <div class="space-y-2">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Scene 1</span>
                    <div class="banner-container" style="width: 160px; height: 600px;">
                        <img src="160x600.png" alt="160x600 Scene 1">
                    </div>
                </div>
                <div class="space-y-2">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Scene 2</span>
                    <div class="banner-container" style="width: 160px; height: 600px;">
                        <img src="160x600-2.png" alt="160x600 Scene 2">
                    </div>
                </div>
            </div>
        </section>

        <!-- 300x600 Section -->
        <section class="mb-16">
            <div class="flex items-baseline space-x-3 mb-6 border-b border-slate-200 pb-2">
                <h2 class="text-xl font-bold text-slate-800">Half Page</h2>
                <span class="text-slate-400 font-mono text-sm">300 x 600</span>
            </div>
            <div class="preview-grid">
                <div class="space-y-2">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Scene 1</span>
                    <div class="banner-container" style="width: 300px; height: 600px;">
                        <img src="300x600.png" alt="300x600 Scene 1">
                    </div>
                </div>
                <div class="space-y-2">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Scene 2</span>
                    <div class="banner-container" style="width: 300px; height: 600px;">
                        <img src="300x600-2.png" alt="300x600 Scene 2">
                    </div>
                </div>
            </div>
        </section>

        <!-- 320x50 Section (3 Scenes) -->
        <section class="mb-16">
            <div class="flex items-baseline space-x-3 mb-6 border-b border-slate-200 pb-2">
                <h2 class="text-xl font-bold text-slate-800">Mobile Leaderboard</h2>
                <span class="text-slate-400 font-mono text-sm">320 x 50</span>
            </div>
            <div class="space-y-6">
                <div class="space-y-2">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Scene 1</span>
                    <div class="banner-container" style="width: 320px; height: 50px;">
                        <img src="320x50.png" alt="320x50 Scene 1">
                    </div>
                </div>
                <div class="space-y-2">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Scene 2</span>
                    <div class="banner-container" style="width: 320px; height: 50px;">
                        <img src="320x50-2.png" >
                    </div>
                </div>
               <!--  <div class="space-y-2">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Scene 3</span>
                    <div class="banner-container" style="width: 320px; height: 50px;">
                        <img src="320x50-3.png" alt="320x50 Scene 3" >
                    </div>
                </div> -->
            </div>
        </section>

    </main>

</body>
</html>
